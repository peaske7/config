set-option -g default-terminal "tmux-256color"
set-option -s escape-time 0
set-option -g focus-events on # enables `autoread`
set-option -g terminal-features 'xterm*:clipboard:ccolour:cstyle:focus:title:extkeys,screen*:title,rxvt*:ignorefkeys,*:RGB'

# Let kitty graphics protocol escape sequences pass through tmux so image.nvim
# and diagram.nvim can render images / mermaid inside nvim under tmux.
set -g allow-passthrough on

# Let tmux recognize modified keys for bindings such as S-Enter. `on` (not
# `always`) forwards CSI-u only to inner apps that opt in via DECSET 2017 —
# zsh-vi-mode doesn't, so Shift+Space stays a plain Space and the undo bug
# from `always` doesn't recur.
set -g extended-keys-format xterm
set -g extended-keys on

unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g mouse on

set-option -g history-limit 200000
set -g set-clipboard on
bind r source-file ~/.tmux.conf
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'

# create new window with current path
bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# vim-tmux-navigator: seamless Ctrl+H/J/K/L across tmux panes and vim splits
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
# Shift+Enter is handled at the terminal level (Ghostty emits `\<CR>` directly,
# Claude Code's documented multi-line escape) — tmux passes the bytes through
# untouched. No S-Enter binding needed here.
bind -n 'C-h' if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n 'C-j' if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n 'C-k' if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n 'C-l' if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys C-\\\\" "select-pane -l"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# prefix + h/j/k/l still available as fallback
bind -r ^ last-window
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# session-switcher popup — C-a C-j to fzf-pick an existing session
# preview shows the session's active pane content via tmux capture-pane
# (technique from github.com/Kristijan/fzf-pane-switch.tmux)
bind C-j display-popup -w 80% -h 70% -E "\
  tmux list-sessions -F '#{session_name}' | \
  grep -v \"^$(tmux display-message -p '#S')\\$\" | \
  fzf --reverse \
      --header='Switch Session' \
      --border --border=rounded --border-label=' tmux sessions ' \
      --preview 'tmux capture-pane -ep -t {}' \
      --preview-window=right,60%,nowrap | \
  xargs tmux switch-client -t"

# workmux dashboard — C-a D
bind D display-popup -w 90% -h 85% -E "workmux dashboard"

set-option -g status-style bg=default
set -g status-right-length 60

set -g @continuum-restore 'on'
set -g @tmux-dotbar-bg default
set -g @tmux-dotbar-right true
set -g @tmux-dotbar-status-right-text ' #(~/.tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load -m 0 -a 0 --interval 2 | sed "s/^/mem /; s/\]  /] cpu /") '

# set -g @open 'x'
# set -g @open-editor 'C-x'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'thepante/tmux-git-autofetch'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'vaaleyard/tmux-dotbar'

run '~/.tmux/plugins/tpm/tpm'
