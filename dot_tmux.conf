set-option -g default-terminal "tmux-256color"
set-option -s escape-time 0
set-option -g focus-events on # enables `autoread`
set-option -sa terminal-features ',*:RGB' # enable truecolor

unbind-key C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -g mouse on

set-option -g history-limit 200000
set -g set-clipboard on
bind r source-file ~/.tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'

# create new window with current path
bind  c  new-window      -c "#{pane_current_path}"
bind  %  split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# switch panes with vim motion
# vim-like pane resizing  
# bind -r C-k resize-pane -U
# bind -r C-j resize-pane -D
# bind -r C-h resize-pane -L
# bind -r C-l resize-pane -R

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U 
bind -r j select-pane -D 
bind -r h select-pane -L 
bind -r l select-pane -R 

# sessionizer — C-a f to fzf-pick a project and switch session
bind-key f run-shell "tmux neww bash -c 'source ~/.aliasrc && ts'"

set-option -g status-style bg=default
set -g status-right '#[fg=brightblack]#([ "$(uname)" = "Darwin" ] && vm_stat | awk "/Pages active/{printf \"mem %.0fM\", \$3*4096/1048576}" || free -m | awk "/Mem:/{printf \"mem %.1fG\", \$3/1024}")'
set -g status-right-length 35

set -g @continuum-restore 'on'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'thepante/tmux-git-autofetch'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'pschmitt/tmux-ssh-split' # splitting panes with ssh commands

run '~/.tmux/plugins/tpm/tpm'
